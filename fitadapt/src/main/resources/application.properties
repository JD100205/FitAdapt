spring.application.name=fitadapt
# Configuración de la Base de Datos (Docker puerto 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/fitadapt_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
# 'update' crea las tablas automáticamente basándose en tus clases Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Puerto del servidor Backend (opcional, por defecto es 8080)
server.port=8080